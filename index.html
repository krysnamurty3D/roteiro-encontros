<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roteiro ECC — Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#14161c;
  --surface:#1c1f29;
  --surface-2:#252836;
  --surface-3:#2e3242;
  --border:#333748;
  --amber:#e8a33d;
  --amber-glow:#f4c766;
  --text:#f3f0e8;
  --text-muted:#9298a6;
  --text-faint:#5c6070;
  --success:#6fae8a;
  --danger:#d9694f;
  --radius:18px;
  --radius-sm:12px;
}
body.light-mode{
  --bg:#f6f4ef;
  --surface:#ffffff;
  --surface-2:#f0ede5;
  --surface-3:#e4e0d5;
  --border:#ddd8ca;
  --amber:#c97a26;
  --amber-glow:#a8611c;
  --text:#221d13;
  --text-muted:#6b6555;
  --text-faint:#948d78;
  --success:#3f8462;
  --danger:#c04f34;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; overflow-x:hidden; width:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Montserrat', sans-serif;
  min-height:100vh;
  padding-bottom:88px;
  max-width:100vw;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
.wrap{max-width:560px; width:100%; margin:0 auto; padding:0 16px; box-sizing:border-box; overflow-x:hidden;}

/* Header */
.topbar{
  position:sticky; top:0; z-index:20;
  background:linear-gradient(180deg, var(--bg) 92%, rgba(20,22,28,0));
  padding:18px 0 10px;
  overflow-x:hidden;
  max-width:100vw;
}
.brand-header{position:relative; padding:12px 16px 4px; min-height:34px;}
#themeToggleBtn{position:absolute; left:16px; top:8px;}
#roleBadge{position:absolute; right:16px; top:12px; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.corner-btn{background:var(--surface); border:1px solid var(--border); border-radius:100px; min-width:30px; height:30px; padding:0 10px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--text-muted); text-transform:uppercase; font-weight:700;}
.brand-center{text-align:center; min-width:0; padding:0 44px; box-sizing:border-box;}
.brand-center h1{font-family:'Fraunces', serif; font-weight:800; font-size:26px; margin:0; letter-spacing:0.3px; text-transform:uppercase;}
.brand-sub{font-family:'Fraunces', serif; font-style:italic; font-size:12.5px; color:var(--text-muted); margin-top:2px; text-transform:uppercase; letter-spacing:0.03em;}
@keyframes flicker{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.7; transform:scale(0.85);}}

.status-row{display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; padding:8px 16px 4px;}
.status-row > div:empty{display:none;}
.status-pill{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:5px 12px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); white-space:nowrap;}

.selectors{display:flex; gap:8px; padding:0 16px;}
select.pick{
  flex:1; appearance:none; background:var(--surface); color:var(--text);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 32px 10px 14px; font-family:'Montserrat'; font-size:13px; font-weight:600;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%239298a6' stroke-width='1.5' fill='none'/></svg>");
  background-repeat:no-repeat; background-position:right 12px center;
}
.days{display:flex; gap:6px; overflow-x:auto; padding:12px 16px 4px; scrollbar-width:none; width:100%; max-width:100%; box-sizing:border-box; mask-image:linear-gradient(90deg, #000 92%, transparent 100%); -webkit-mask-image:linear-gradient(90deg, #000 92%, transparent 100%);}
.days::-webkit-scrollbar{display:none;}
.day-pill{
  flex:0 0 auto; padding:8px 14px; border-radius:100px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-muted); font-size:12.5px; font-weight:700;
  white-space:nowrap; cursor:pointer;
}
.day-pill.active{background:var(--amber); border-color:var(--amber); color:#231705;}

#clockSimRow{padding:8px 16px 0;}
#syncStatusRow{padding:6px 16px 0;}
.sync-row{font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:6px;}
.sync-row.offline{color:var(--danger);}
.sync-dot{width:6px; height:6px; border-radius:50%; background:var(--success); flex:0 0 auto;}
.clock-toggle{background:none; border:none; color:var(--text-faint); font-size:11.5px; font-weight:600; padding:2px 0; cursor:pointer; text-decoration:underline; text-decoration-color:var(--surface-3);}
.clock-toggle-btn{background:var(--danger); color:#2a0f0a; border:none; font-size:11px; font-weight:800; padding:6px 14px; border-radius:100px; cursor:pointer; letter-spacing:0.03em;}
.clock-sim-active{font-size:11.5px; color:var(--amber-glow); background:var(--surface-2); border:1px solid rgba(232,163,61,0.4); padding:6px 12px; border-radius:100px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.clock-clear{background:none; border:none; color:var(--text-faint); font-size:11px; text-decoration:underline; cursor:pointer; padding:0;}
.clock-mini-btn{background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-size:12px; width:24px; height:24px; border-radius:50%; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0;}
.clock-panel{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); padding:8px 10px; border-radius:12px; flex-wrap:wrap;}
.clock-panel input[type=time]{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 8px; font-family:'JetBrains Mono'; font-size:13px;}
.clock-speed-select{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 8px; font-family:'Montserrat'; font-size:12.5px;}

/* Tab bar */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; justify-content:center;
  padding:8px max(8px, env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));
}
.tabbar-inner{display:flex; width:100%; max-width:560px; gap:4px;}
.tab-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; color:var(--text-faint); padding:8px 4px; border-radius:12px;
  font-family:'Montserrat'; font-size:11px; font-weight:700; cursor:pointer;
}
.tab-btn.active{color:var(--amber);}
.tab-btn svg{width:22px; height:22px;}

main{padding-top:6px;}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
.tag{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); background:var(--surface-2); padding:5px 10px; border-radius:100px;}
.skip-tag{font-size:9.5px; font-weight:800; text-transform:uppercase; color:var(--text-faint); background:var(--surface-3); padding:1px 6px; border-radius:100px;}
.used-time{font-family:'JetBrains Mono', monospace; font-weight:700; padding:1px 6px; border-radius:6px;}
.planned-time{font-family:'JetBrains Mono', monospace; font-weight:600; color:var(--text-faint); padding:1px 4px;}
.used-time.used-less{color:var(--success);}
.used-time.used-ontime{color:var(--amber-glow);}
.used-time.used-more{color:var(--danger);}

/* LIVE TAB */
.status-banner{display:flex; align-items:center; gap:16px; margin:10px 16px 4px; padding:18px 20px; border-radius:20px; border:1px solid var(--border);}
.status-banner.late{background:linear-gradient(135deg, rgba(217,105,79,0.22), rgba(217,105,79,0.06)); border-color:rgba(217,105,79,0.45);}
.status-banner.early{background:linear-gradient(135deg, rgba(111,174,138,0.22), rgba(111,174,138,0.06)); border-color:rgba(111,174,138,0.45);}
.status-banner.ontime{background:linear-gradient(135deg, rgba(232,163,61,0.18), rgba(232,163,61,0.04)); border-color:rgba(232,163,61,0.4);}
.status-icon{font-size:34px; line-height:1; flex:0 0 auto;}
.status-label{font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted);}
.status-banner.late .status-label{color:var(--danger);}
.status-banner.early .status-label{color:var(--success);}
.status-banner.ontime .status-label{color:var(--amber-glow);}
.status-value{font-family:'Fraunces', serif; font-weight:700; font-size:26px; margin-top:2px;}
.status-banner.late .status-value{color:var(--danger);}
.status-banner.early .status-value{color:var(--success);}
.status-banner.ontime .status-value{color:var(--amber-glow);}

.team-alert{display:flex; align-items:center; gap:12px; margin:0 16px 12px; padding:12px 16px; border-radius:14px; background:rgba(232,163,61,0.12); border:1px solid rgba(232,163,61,0.4);}
.team-alert.urgent{background:rgba(217,105,79,0.18); border-color:rgba(217,105,79,0.5); animation:pulse-urgent 1.2s ease-in-out infinite;}
@keyframes pulse-urgent{0%,100%{opacity:1;} 50%{opacity:0.75;}}
.team-alert-icon{font-size:22px;}
.team-alert-who{font-weight:800; font-size:14px;}
.team-alert.urgent .team-alert-who{color:var(--danger);}
.team-alert-when{font-size:12px; color:var(--text-muted); font-family:'JetBrains Mono', monospace;}
.lock-banner{margin:0 16px 14px; padding:14px 16px; border-radius:14px; background:rgba(146,152,166,0.1); border:1px solid var(--border); font-size:12.5px; color:var(--text-muted); line-height:1.5;}
.lock-takeover{display:block; margin-top:8px; background:none; border:none; color:var(--amber-glow); font-size:12px; font-weight:700; text-decoration:underline; cursor:pointer; padding:0;}
.live-hero{margin:10px 16px 14px; padding:26px 22px; border-radius:24px; background:radial-gradient(120% 140% at 20% -10%, #2b2412 0%, var(--surface) 55%); border:1px solid var(--border); position:relative; overflow:hidden;}
.live-hero.overtime{background:radial-gradient(120% 140% at 20% -10%, #2f1a15 0%, var(--surface) 55%);}
.live-top-row{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:16px;}
.live-badge{display:flex; align-items:center; gap:7px; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--amber);}
.live-badge .dot{width:8px; height:8px; border-radius:50%; background:var(--amber); animation:flicker 1.6s ease-in-out infinite;}
.live-loc{font-size:11px; font-weight:700; color:var(--text-muted);}
.live-title{font-family:'Fraunces', serif; font-weight:600; font-size:24px; line-height:1.25; margin:0 0 18px;}
.timer-row{display:flex; align-items:center; gap:18px;}
.ring-wrap{position:relative; width:96px; height:96px; flex:0 0 auto;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none; stroke:var(--surface-3); stroke-width:7;}
.ring-fg{fill:none; stroke:var(--amber); stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset 1s linear;}
.ring-fg.overtime{stroke:var(--danger);}
.timer-num{font-family:'JetBrains Mono', monospace; font-weight:700; font-size:26px;}
.timer-num.overtime{color:var(--danger);}
.timer-label{font-size:12px; color:var(--text-muted); margin-top:2px;}
.next-strip{margin:0 16px 12px; padding:14px 16px; border-radius:var(--radius-sm); background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; gap:12px;}
.next-strip .lbl{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-faint);}
.next-strip .ttl{font-size:14px; font-weight:600; margin-top:2px;}
.next-strip .meta{font-size:12px; color:var(--text-muted); margin-top:1px;}
.btnrow{display:flex; gap:10px; margin:14px 16px 4px;}
.btn{
  flex:1; border:none; border-radius:var(--radius-sm); padding:15px 16px; font-family:'Montserrat'; font-weight:800;
  font-size:14.5px; cursor:pointer; text-align:center;
}
.btn-primary{background:var(--amber); color:#231705;}
.btn-ghost{background:var(--surface); color:var(--text-muted); border:1px solid var(--border); flex:0 0 auto; padding:15px 18px;}
.btn-danger{background:var(--danger); color:#2a0f0a;}

.reset-row{text-align:center; margin:22px 16px 4px;}
.reset-link{background:none; border:none; color:var(--text-faint); font-size:12px; font-weight:600; text-decoration:underline; text-decoration-color:var(--surface-3); cursor:pointer; padding:6px;}
.reset-confirm{margin:20px 16px 4px; padding:16px; border-radius:var(--radius-sm); background:rgba(217,105,79,0.08); border:1px solid rgba(217,105,79,0.35);}
.reset-confirm-text{font-size:12.5px; color:var(--text-muted); line-height:1.5;}
.btn-full{width:100%;}
.finished-box{margin:16px; padding:28px 20px; text-align:center; border-radius:var(--radius); background:var(--surface); border:1px solid var(--border);}
.finished-box .big{font-family:'Fraunces', serif; font-size:20px; margin:8px 0 4px;}

.mini-timeline{margin:20px 16px 12px;}
.mini-timeline h3{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); margin:0 0 10px 4px;}
.mini-item{display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid var(--border); cursor:pointer;}
.mini-start-btn{flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:rgba(232,163,61,0.14); border:1px solid rgba(232,163,61,0.4); color:var(--amber-glow); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding-left:2px;}
.mini-start-btn:hover{background:rgba(232,163,61,0.28);}
.mini-item:last-child{border-bottom:none;}
.mini-check{width:20px; height:20px; border-radius:50%; border:2px solid var(--surface-3); flex:0 0 auto; display:flex; align-items:center; justify-content:center;}
.mini-item.done .mini-check{background:var(--success); border-color:var(--success);}
.mini-item.active .mini-check{background:var(--amber); border-color:var(--amber);}
.mini-time{font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text-muted); width:44px; flex:0 0 auto;}

.time-cell{display:flex; flex-direction:column; gap:2px; width:64px; flex:0 0 auto;}
.time-planned{font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint);}
.time-live{font-family:'JetBrains Mono', monospace; font-weight:800; font-size:14px; color:var(--text);}
.time-live.late{color:var(--danger);}
.time-live.early{color:var(--success);}
.time-delta{display:inline-block; font-size:10px; font-weight:800; padding:1px 6px; border-radius:100px; margin-top:1px; width:fit-content;}
.time-delta.late{background:rgba(217,105,79,0.16); color:var(--danger);}
.time-delta.early{background:rgba(111,174,138,0.16); color:var(--success);}
.time-delta-inline{font-size:11px; font-weight:800; padding:1px 6px; border-radius:100px;}
.time-delta-inline.late{background:rgba(217,105,79,0.16); color:var(--danger);}
.time-delta-inline.early{background:rgba(111,174,138,0.16); color:var(--success);}
.time-line{font-size:12px; color:var(--text-muted); margin-top:2px;}
.time-line.small{font-size:11px; margin-top:3px;}
.time-live-inline{font-weight:800;}
.time-live-inline.late{color:var(--danger);}
.time-live-inline.early{color:var(--success);}
.mini-txt{flex:1; min-width:0;}
.mini-txt .t{font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.mini-txt .l{font-size:11px; color:var(--text-faint);}
.mini-item.done .mini-txt .t{color:var(--text-faint); text-decoration:line-through;}
.mini-item.active .mini-txt .t{color:var(--amber);}
.delta{display:inline-block; font-size:9.5px; font-weight:800; padding:1px 6px; border-radius:100px; margin-left:5px; letter-spacing:0.02em;}
.delta.late{background:rgba(217,105,79,0.16); color:var(--danger);}
.delta.early{background:rgba(111,174,138,0.16); color:var(--success);}

/* PROGRAM TAB */
.table-head{display:flex; gap:14px; padding:0 20px 6px; margin:6px 0 0;}
.table-head span{font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-faint);}
.table-head span:first-child{width:64px; flex:0 0 auto;}
.prog-item{display:flex; gap:14px; padding:14px 4px; border-bottom:1px solid var(--border);}
.prog-item:last-child{border-bottom:none;}
.prog-time{font-family:'JetBrains Mono', monospace; font-weight:700; font-size:13.5px; color:var(--amber); width:48px; flex:0 0 auto; padding-top:2px;}
.prog-body .title{font-family:'Fraunces', serif; font-size:15.5px; font-weight:600; line-height:1.3;}
.prog-body .meta{font-size:11.5px; color:var(--text-muted); margin-top:4px; display:flex; gap:8px; align-items:center;}
.prog-item.live-now{background:linear-gradient(90deg, rgba(232,163,61,0.1), transparent); border-radius:10px;}
.prog-item.live-now .prog-time{color:var(--amber-glow);}
.livedot{width:7px; height:7px; border-radius:50%; background:var(--amber); animation:flicker 1.6s ease-in-out infinite;}

/* EDIT TAB */
.section-title{display:flex; justify-content:space-between; align-items:center; margin:18px 4px 10px;}
.section-title h2{font-family:'Fraunces', serif; font-size:16px; margin:0;}
.small-btn{background:var(--surface); border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:700; padding:8px 12px; border-radius:100px; cursor:pointer;}
.small-btn.danger{background:rgba(217,105,79,0.14); border-color:rgba(217,105,79,0.4); color:var(--danger);}
.small-btn.amber{background:rgba(232,163,61,0.14); border-color:rgba(232,163,61,0.4); color:var(--amber-glow);}
.day-edit-row{display:flex; align-items:center; gap:8px; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer;}
.access-list{margin:0 4px;}
.access-row{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:6px; font-size:13px;}
.roteiro-list{margin:0 4px;}
.roteiro-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px;}
.roteiro-card.current{border-color:var(--amber); background:rgba(232,163,61,0.06);}
.roteiro-card-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.roteiro-card-name{font-family:'Fraunces', serif; font-weight:600; font-size:14.5px;}
.roteiro-card-top .tag{font-size:9.5px; font-weight:800; text-transform:uppercase; color:var(--amber-glow); background:rgba(232,163,61,0.14); padding:2px 8px; border-radius:100px;}
.roteiro-card-church{font-size:12px; color:var(--text-muted); margin-top:2px;}
.roteiro-card-meta{font-size:11.5px; color:var(--text-faint); margin-top:4px;}
.roteiro-card button{margin-top:8px;}
.activity-list{margin:0 4px;}
.activity-row{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); font-size:12.5px; line-height:1.4;}
.activity-row:last-child{border-bottom:none;}
.activity-time{font-family:'JetBrains Mono', monospace; color:var(--text-faint); font-size:11px; flex:0 0 auto;}
.day-edit-row.selected{border-color:var(--amber); background:rgba(232,163,61,0.08);}
.day-edit-row input{flex:1; background:transparent; border:none; color:var(--text); font-family:'Montserrat'; font-weight:600; font-size:13.5px; padding:4px;}
.iconbtn{background:none; border:none; color:var(--text-faint); cursor:pointer; padding:6px; display:flex;}
.iconbtn:hover{color:var(--text);}
.iconbtn svg{width:17px; height:17px;}

.event-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; margin-bottom:10px;}
.event-top{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.event-time-box{display:flex; align-items:center; gap:6px;}
.event-time-box input[type=time]{
  background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 8px;
  font-family:'JetBrains Mono'; font-size:13px; width:88px;
}
.time-computed{font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--text-faint); padding:6px 4px;}
.pin-btn{background:none; border:none; cursor:pointer; color:var(--text-faint); font-size:14px; padding:4px;}
.pin-btn.on{color:var(--amber);}
.spacer{flex:1;}
.event-fields{display:grid; grid-template-columns:1fr; gap:8px;}
.event-fields input[type=text]{
  width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:9px 10px; font-family:'Montserrat'; font-size:13.5px;
}
.event-fields input.title-input{font-family:'Fraunces', serif; font-size:14.5px; font-weight:600;}
.row2{display:flex; gap:8px;}
.dur-box{display:flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:0 8px;}
.dur-box input{width:44px; background:none; border:none; color:var(--text); font-family:'JetBrains Mono'; font-size:13px; padding:9px 0; text-align:right;}
.dur-box span{font-size:11px; color:var(--text-faint);}
.done-toggle{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-muted); cursor:pointer; user-select:none;}
.done-toggle input{accent-color:var(--success);}

.edition-actions{display:flex; gap:8px; margin:14px 4px 4px; flex-wrap:wrap; max-width:100%;}
.inline-form{display:flex; gap:8px; margin:10px 4px; background:var(--surface); border:1px solid var(--border); padding:10px; border-radius:var(--radius-sm);}
.inline-form input{flex:1; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; font-size:13px;}
.empty{text-align:center; padding:40px 20px; color:var(--text-faint); font-size:13.5px;}
.hint{font-size:12px; color:var(--text-faint); margin:6px 4px 0; line-height:1.5;}
.print-only{display:none !important;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block !important; position:absolute; top:0; left:0; width:100%; padding:20px; color:#000; background:#fff;}
  #printArea h1{font-family:'Fraunces', serif; font-size:22px; margin:0 0 14px;}
  #printArea h2{font-family:'Fraunces', serif; font-size:16px; margin:22px 0 8px; border-bottom:2px solid #333; padding-bottom:4px;}
  #printArea table{width:100%; border-collapse:collapse; font-size:11px; margin-bottom:10px;}
  #printArea th, #printArea td{border:1px solid #999; padding:5px 7px; text-align:left;}
  #printArea th{background:#eee;}
}
.sticky-status{position:sticky; z-index:15; background:var(--bg); padding-top:2px;}
.see-full-link{text-align:center; font-size:12px; color:var(--text-faint); margin:14px 16px 4px;}

.role-picker{max-width:420px; margin:15vh auto 0; padding:0 24px; text-align:center;}
.role-flame{font-size:40px; margin-bottom:6px;}
.role-picker h1{font-family:'Fraunces', serif; font-size:26px; margin:0 0 6px;}
.role-picker p{color:var(--text-muted); font-size:14px; margin:0 0 28px;}
.role-btn{display:block; width:100%; text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:14px; cursor:pointer;}
.role-btn:hover{border-color:var(--amber);}
.role-btn-title{font-family:'Fraunces', serif; font-weight:600; font-size:17px; color:var(--text);}
.role-btn-sub{font-size:12.5px; color:var(--text-muted); margin-top:4px; line-height:1.4;}
.role-pw-box{margin-top:8px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:14px; text-align:left;}
.role-pw-label{font-size:12px; color:var(--text-muted); margin-bottom:8px;}
.role-pw-box input[type=password]{width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px 12px; font-size:14px;}
.role-pw-err{color:var(--danger); font-size:12px; margin-top:6px;}
.role-switch-yes, .role-switch-no{border:none; border-radius:100px; font-size:10px; font-weight:800; padding:2px 8px; cursor:pointer; margin-left:2px;}
.role-switch-yes{background:var(--danger); color:#2a0f0a;}
.role-switch-no{background:var(--surface-3); color:var(--text);}
.import-error{margin:10px 4px; padding:12px 14px; background:rgba(217,105,79,0.1); border:1px solid rgba(217,105,79,0.35); border-radius:12px; font-size:12.5px; color:var(--text-muted); line-height:1.5;}

<script>
(function(){

/* ---------- helpers ---------- */
/* ---------- conexão com o Firebase (substitui o armazenamento do Claude) ---------- */
// PASSO A PASSO PRA CONFIGURAR: veja as instruções que a Claude te mandou junto
// com este arquivo. Depois de criar seu projeto gratuito no Firebase, cole os
// valores que o próprio site do Firebase te dá aqui embaixo, no lugar dos
// textos "COLE_AQUI...".
var firebaseConfig = {
  apiKey: "AIzaSyBbLZov6ilLKIc85e5qQQ1qB49pvvjFKKk",
  authDomain: "roteiroencontros.firebaseapp.com",
  databaseURL: "https://roteiroencontros-default-rtdb.firebaseio.com",
  projectId: "roteiroencontros",
  storageBucket: "roteiroencontros.firebasestorage.app",
  messagingSenderId: "912957509405",
  appId: "1:912957509405:web:4d13584687693c4122dbf4"
};

var FIREBASE_READY = false;
var fbDb = null;
function firebaseIsConfigured(){
  return firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('COLE_AQUI') === -1;
}
function initFirebase(){
  return new Promise(function(resolve){
    try{
      if(!firebaseIsConfigured() || typeof firebase === 'undefined'){ resolve(false); return; }
      firebase.initializeApp(firebaseConfig);
      fbDb = firebase.database();
      // Faz um login anônimo e silencioso — a pessoa não vê nada disso,
      // mas é o que permite deixar as regras do Firebase mais seguras
      // (exigindo "estar logado" pra ler/gravar) sem pedir senha do Google
      // nem nada complicado pra ninguém.
      firebase.auth().signInAnonymously().then(function(){
        FIREBASE_READY = true;
        resolve(true);
      }).catch(function(){
        FIREBASE_READY = false;
        resolve(false);
      });
    }catch(e){
      FIREBASE_READY = false;
      resolve(false);
    }
  });
}
function dbGetOnce(path){
  if(!FIREBASE_READY) return Promise.resolve(null);
  return fbDb.ref(path).once('value').then(function(snap){ return snap.val(); }).catch(function(){ return null; });
}
function dbSet(path, value){
  if(!FIREBASE_READY) return Promise.resolve();
  return fbDb.ref(path).set(value).catch(function(){});
}
function dbListen(path, cb){
  if(!FIREBASE_READY) return;
  var ref = fbDb.ref(path);
  ref.on('value', function(snap){ cb(snap.val()); }, function(){ syncStatus.failCount++; });
  activeListeners.push(ref);
}
function detachAllListeners(){
  activeListeners.forEach(function(ref){ try{ ref.off(); }catch(e){} });
  activeListeners = [];
}
var activeListeners = [];

// Preferências pessoais (papel escolhido, tema claro/escuro) ficam só neste
// aparelho — usamos o armazenamento do próprio navegador (não precisa do Firebase).
function localGet(key){
  try{ return window.localStorage.getItem(key); }catch(e){ return null; }
}
function localSet(key, value){
  try{ window.localStorage.setItem(key, value); }catch(e){}
}

function uid(p){return p+'-'+Math.random().toString(36).slice(2,9);}

// Relógio de TESTE — só existe neste aparelho, nunca é salvo ou compartilhado.
// Serve pra você simular "estamos começando às 20h" mesmo testando de tarde,
// acelerar o tempo (1 segundo real vira vários minutos simulados), e agora
// também pausar ou parar o teste.
var simActive = false;
var simPaused = false;
var timeScale = 1;
var scaleBaseRealMs = Date.now();
var scaleBaseSimMs = Date.now();
var pausedAtSimMs = null;

function nowMs(){
  if(!simActive) return Date.now();
  if(simPaused) return pausedAtSimMs;
  return scaleBaseSimMs + (Date.now() - scaleBaseRealMs) * timeScale;
}
function setSimClock(targetSimMs, scale){
  simActive = true;
  simPaused = false;
  scaleBaseRealMs = Date.now();
  scaleBaseSimMs = targetSimMs;
  timeScale = scale;
}
function pauseSim(){
  if(!simActive || simPaused) return;
  pausedAtSimMs = nowMs();
  simPaused = true;
}
function resumeSim(){
  if(!simActive || !simPaused) return;
  scaleBaseRealMs = Date.now();
  scaleBaseSimMs = pausedAtSimMs;
  simPaused = false;
}
function stopSim(){
  // Ao parar o teste, o progresso feito com o relógio simulado deixa de fazer
  // sentido no horário real (por isso o "348:03" maluco) — então reinicia o
  // progresso ao vivo do dia atual, pra começar limpo quando voltar ao horário real.
  var day = currentDay();
  if(day){
    day.events.forEach(function(e){ e.done=false; e.actualStartMs=null; e.skipped=false; });
    day.live.activeEventId = null;
    day.live.startedAt = null;
    day.live.finished = false;
    persist();
  }
  simActive = false;
  simPaused = false;
  timeScale = 1;
}
function toMin(hhmm){ if(!hhmm) return 0; var a=hhmm.split(':'); return (+a[0])*60+(+a[1]); }
function fromMin(total){
  total = ((total%1440)+1440)%1440;
  var h = Math.floor(total/60), m = total%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function playAlertTone(pattern){
  try{
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
    osc.start();
    osc.stop(ctx.currentTime+0.45);
  }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate(pattern||[200]); }catch(e){}
}
var warnedEventIds = {};
var overtimeAlertedIds = {};
function checkTimeAlerts(eventId, remaining, overtime){
  if(!overtime && remaining>0 && remaining<=60 && !warnedEventIds[eventId]){
    warnedEventIds[eventId] = true;
    playAlertTone([150]);
  }
  if(overtime && !overtimeAlertedIds[eventId]){
    overtimeAlertedIds[eventId] = true;
    playAlertTone([200,100,200,100,200]);
  }
}
function fmtClock(sec){
  var neg = sec<0; sec = Math.abs(sec);
  var m = Math.floor(sec/60), s = sec%60;
  return (neg?'+':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtMinSec(totalSec){
  totalSec = Math.max(0, totalSec||0);
  var m = Math.floor(totalSec/60), s = totalSec%60;
  return m+':'+String(s).padStart(2,'0');
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDelta(delta){
  var sign = delta>0 ? '+' : '-';
  var abs = Math.abs(delta);
  if(abs < 60) return sign+abs+'min';
  var h = Math.floor(abs/60), m = abs%60;
  return sign+h+'h'+String(m).padStart(2,'0');
}
function timeCell(ev){
  var cls = ev.deltaMin>0 ? 'late' : (ev.deltaMin<0 ? 'early' : '');
  return '<div class="time-cell">'+
    '<div class="time-planned">'+ev.plannedTime+'</div>'+
    '<div class="time-live '+cls+'">'+ev.time+'</div>'+
  '</div>';
}
function previstoAtualLine(ev){
  var cls = ev.deltaMin>0 ? 'late' : (ev.deltaMin<0 ? 'early' : '');
  return 'Previsto '+ev.plannedTime+' · Atual <span class="time-live-inline '+cls+'">'+ev.time+'</span>';
}

// Delta "geral" do encontro nesse momento: usa a etapa que está rolando agora
// (ou a última concluída, se o dia já acabou). Como cada delta já é cumulativo
// (veja computeLiveSchedule), isso representa o atraso/adiantamento do dia inteiro.
function overallDelta(day, schedule){
  if(day.live.activeEventId){
    var cur = schedule.find(function(e){ return e.id===day.live.activeEventId; });
    return cur ? cur.deltaMin : 0;
  }
  var lastDone = null;
  schedule.forEach(function(e){ if(e.done) lastDone = e; });
  return lastDone ? lastDone.deltaMin : 0;
}

function renderStatusBanner(day, schedule){
  if(!day.live.activeEventId && !day.live.finished) return '';
  var delta = overallDelta(day, schedule);
  var cls = delta>0 ? 'late' : (delta<0 ? 'early' : 'ontime');
  var label = delta>0 ? 'Encontro atrasado' : (delta<0 ? 'Encontro adiantado' : 'Encontro no horário');
  var icon = delta>0 ? '⏰' : (delta<0 ? '⚡' : '✓');
  var value = delta ? fmtDelta(delta) : 'certinho';
  return '<div class="status-banner '+cls+'">'+
    '<div class="status-icon">'+icon+'</div>'+
    '<div><div class="status-label">'+label+'</div><div class="status-value">'+value+'</div></div>'+
  '</div>';
}

var TEAM_ALERT_SEC = 600; // avisa com 10 minutos de antecedência
function renderTeamAlert(next){
  if(!next || !next.responsavel) return '';
  var secondsUntil = Math.round((next.startMs - nowMs())/1000);
  if(secondsUntil > TEAM_ALERT_SEC) return '';
  var urgent = secondsUntil <= 0;
  return '<div class="team-alert'+(urgent?' urgent':'')+'">'+
    '<div class="team-alert-icon">🔔</div>'+
    '<div><div class="team-alert-who">'+esc(next.responsavel)+'</div>'+
    '<div class="team-alert-when">'+(urgent ? 'se posicionar AGORA' : 'se posicionar em '+fmtMinSec(Math.max(0,secondsUntil)))+'</div></div>'+
  '</div>';
}
function todayMs(hhmm){
  var now = new Date(), mins = toMin(hhmm);
  return new Date(now.getFullYear(), now.getMonth(), now.getDate(), Math.floor(mins/60), mins%60, 0, 0).getTime();
}
function fromMs(ms){
  var d = new Date(ms);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// Horário PLANEJADO puro (o que está no papel) — usado na aba Editar.
function computePlannedSchedule(day){
  var cursor = null, out = [];
  day.events.forEach(function(ev){
    var start;
    if(ev.anchorTime){ cursor = toMin(ev.anchorTime); start = cursor; }
    else { if(cursor===null) cursor = 0; start = cursor; }
    out.push(Object.assign({}, ev, {time: fromMin(start)}));
    cursor = start + (ev.durMin||0);
  });
  return out;
}

// Horário AO VIVO — usa o horário real de início de cada etapa já iniciada
// e projeta as próximas a partir daí. Se uma etapa atrasar ou terminar antes,
// tudo que vem depois se ajusta sozinho. Antes de o dia começar, é igual ao planejado.
// O "esperado" de cada etapa é recalibrado pelo horário real em que o dia foi
// de fato iniciado — assim o atraso/adiantamento mostrado é sempre o que
// aconteceu DENTRO do encontro, e não a diferença entre "agora" e a hora
// escrita na planilha (que não tem por que bater quando você está testando).
function computeLiveSchedule(day){
  var planned = computePlannedSchedule(day);
  var now = nowMs();

  var kickoffIdx = -1, baseOffsetMs = 0;
  for(var k=0;k<day.events.length;k++){
    if(day.events[k].actualStartMs != null){
      kickoffIdx = k;
      baseOffsetMs = day.events[k].actualStartMs - todayMs(planned[k].time);
      break;
    }
  }

  var cursorMs = null, out = [];
  day.events.forEach(function(ev, i){
    var expectedMs = todayMs(planned[i].time) + baseOffsetMs;
    var startMs;
    if(ev.actualStartMs != null){
      startMs = ev.actualStartMs;
      if(ev.id === day.live.activeEventId && !ev.done){
        cursorMs = Math.max(startMs + (ev.durMin||0)*60000, now);
      } else {
        cursorMs = startMs + (ev.durMin||0)*60000;
      }
    } else if(cursorMs !== null){
      startMs = cursorMs;
      cursorMs = startMs + (ev.durMin||0)*60000;
    } else {
      startMs = expectedMs;
      cursorMs = startMs + (ev.durMin||0)*60000;
    }
    // A etapa que deu a largada do dia mostra o adiantamento/atraso REAL dela
    // em relação ao papel. As etapas seguintes mostram só o que elas mesmas
    // desviaram dali pra frente (pra não repetir o mesmo número em todo mundo).
    var delta = (i === kickoffIdx)
      ? Math.round(baseOffsetMs/60000)
      : Math.round((startMs - expectedMs)/60000);
    out.push(Object.assign({}, ev, {time: fromMs(startMs), startMs: startMs, deltaMin: delta, plannedTime: planned[i].time}));
  });

  // Duração REAL de cada etapa, com precisão de segundos: pra quem já terminou,
  // é o tempo até a etapa seguinte realmente começar (não o tempo previsto).
  // Pra quem está rolando agora, é o tempo decorrido até este instante.
  // Só quem ainda nem começou continua mostrando a duração prevista, porque
  // é a única informação que existe até ali.
  out.forEach(function(ev, i){
    if(ev.done && out[i+1]){
      ev.durRealSec = Math.max(0, Math.round((out[i+1].startMs - ev.startMs)/1000));
      ev.durReal = Math.round(ev.durRealSec/60);
    } else if(ev.id === day.live.activeEventId && !ev.done){
      ev.durRealSec = Math.max(0, Math.round((now - ev.startMs)/1000));
      ev.durReal = Math.round(ev.durRealSec/60);
    } else {
      ev.durRealSec = (ev.durMin||0)*60;
      ev.durReal = ev.durMin;
    }
  });

  return out;
}

/* ---------- seed data ---------- */
/* ---------- importar planilha (Excel/CSV) ---------- */
// Entende o formato clássico de roteiro: colunas HORA, TEMPO, CONTROLE, LOCAL, EVENTO
// (e opcionalmente RESPONSÁVEL), com uma linha de título antes de cada dia.

// Se a planilha não tiver uma coluna de responsável, tenta adivinhar pela
// própria descrição do momento — só pras equipes com um padrão bem claro no texto.
// Trânsito, Boa Vontade e Recepção aos Palestrantes não têm um padrão de texto
// único e confiável, então ficam em branco pra você preencher pelo Editar.
function guessResponsavel(title){
  var t = (title||'').toLowerCase();
  if(/círculo/.test(t)) return 'Círculos';
  if(/almoço|jantar/.test(t)) return 'Garçons';
  if(/cafezinho|lanchão/.test(t)) return 'Cafezinho';
  if(/bandinha/.test(t)) return 'Bandinha';
  return '';
}
function detectColumns(headerRow){
  var map = {};
  headerRow.forEach(function(cell, i){
    var c = String(cell||'').trim().toLowerCase();
    if(/^hora/.test(c)) map.hora = i;
    else if(/tempo|dura/.test(c)) map.tempo = i;
    else if(/^local/.test(c)) map.local = i;
    else if(/evento|momento/.test(c)) map.evento = i;
    else if(/respons|equipe/.test(c)) map.responsavel = i;
  });
  return (map.hora!=null && map.evento!=null) ? map : null;
}
function parseDurationCell(v){
  if(v==null || v==='') return 0;
  if(typeof v === 'number'){
    if(v < 1) return Math.round(v*24*60);
    return Math.round(v);
  }
  var s = String(v).trim();
  var m = s.match(/^(\d+):(\d{2})(?::(\d{2}))?$/);
  if(m){
    var h = parseInt(m[1],10), mi = parseInt(m[2],10), se = m[3]?parseInt(m[3],10):0;
    return h*60+mi+Math.round(se/60);
  }
  var num = parseFloat(s.replace(',','.'));
  return isNaN(num) ? 0 : Math.round(num);
}
function parseTimeCell(v){
  if(v==null) return null;
  var s = String(v).trim();
  var m = s.match(/^(\d{1,2}):(\d{2})/);
  if(!m) return null;
  var h = parseInt(m[1],10), mi = parseInt(m[2],10);
  if(h>23||mi>59) return null;
  return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');
}
function isHeaderRow(row){
  return row.some(function(c){ return /^hora/i.test(String(c||'').trim()); }) &&
         row.some(function(c){ return /evento|momento/i.test(String(c||'').trim()); });
}
function parseSheetToDays(rows){
  var days = [];
  var pendingLabel = null;
  var colMap = null;
  var currentDay = null;

  rows.forEach(function(row){
    var nonEmpty = row.filter(function(c){ return c!=null && String(c).trim()!==''; });
    if(nonEmpty.length===0) return;

    if(isHeaderRow(row)){
      colMap = detectColumns(row);
      currentDay = { id: uid('day'), label: pendingLabel || ('Dia '+(days.length+1)), live:{activeEventId:null,startedAt:null,finished:false}, events: [] };
      days.push(currentDay);
      pendingLabel = null;
      return;
    }

    if(!colMap){
      if(nonEmpty.length <= 2){ pendingLabel = String(nonEmpty[0]).trim(); }
      return;
    }

    var timeVal = parseTimeCell(row[colMap.hora]);
    if(!timeVal){
      if(nonEmpty.length <= 2){
        pendingLabel = String(nonEmpty[0]).trim();
        colMap = null;
      }
      return;
    }

    var durMin = parseDurationCell(row[colMap.tempo]);
    var local = colMap.local!=null ? String(row[colMap.local]||'').trim() : '';
    var titulo = colMap.evento!=null ? String(row[colMap.evento]||'').trim() : '';
    var responsavel = colMap.responsavel!=null ? String(row[colMap.responsavel]||'').trim() : '';
    if(!responsavel) responsavel = guessResponsavel(titulo);
    if(!titulo) return;

    currentDay.events.push({
      id: uid('ev'),
      anchorTime: currentDay.events.length===0 ? timeVal : null,
      durMin: durMin, local: local, title: titulo,
      done:false, actualStartMs:null, skipped:false,
      responsavel: responsavel, notes: ''
    });
  });

  return days.filter(function(d){ return d.events.length>0; });
}
function parseWorkbookToDays(wb){
  var allDays = [];
  wb.SheetNames.forEach(function(name){
    var rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, raw:false, defval:''});
    allDays = allDays.concat(parseSheetToDays(rows));
  });
  return allDays;
}

// Importação do Word: converte o .docx pra HTML (com a biblioteca Mammoth),
// pega cada tabela encontrada no documento, e reaproveita o MESMO entendedor
// de linhas usado pra planilha — já que, no fim, é a mesma ideia (linhas com
// HORA, TEMPO, LOCAL, EVENTO).
function parseWordToDays(html){
  var container = document.createElement('div');
  container.innerHTML = html;
  var tables = container.querySelectorAll('table');
  var allDays = [];
  tables.forEach(function(table){
    var rows = [];
    table.querySelectorAll('tr').forEach(function(tr){
      var cells = Array.from(tr.querySelectorAll('td,th')).map(function(td){ return td.textContent.trim(); });
      rows.push(cells);
    });
    allDays = allDays.concat(parseSheetToDays(rows));
  });
  return allDays;
}

/* ---------- state ---------- */
// 'editions' é o roteiro em si — fica em armazenamento COMPARTILHADO,
// assim PC, iPad e celulares veem sempre a mesma versão.
// 'nav' é só a navegação de cada aparelho (qual dia/edição/aba está olhando)
// e NÃO é compartilhada — cada aparelho pode navegar livremente sem bagunçar o dos outros.
var editions = [];

// Trava leve de controle: evita que dois aparelhos avancem o Ao Vivo ao mesmo
// tempo sem perceber. Não impede nada de força bruta — é um aviso + as ações
// ficam ocultas nesse aparelho enquanto outro estiver "segurando" o controle.
// A identidade do aparelho fica guardada no navegador (não muda a cada recarregada
// de página) — assim, dar um F5 não faz o aparelho "travar contra si mesmo".
function getMySessionId(){
  var existing = localGet('ecc-session-id');
  if(existing) return existing;
  var fresh = uid('sess');
  localSet('ecc-session-id', fresh);
  return fresh;
}
var mySessionId = getMySessionId();
var controllerInfo = { sessionId: null, lastSeen: 0 };
var CONTROLLER_KEY = 'roteiro/controller';
var CONTROLLER_TIMEOUT_MS = 12000;

// Cada aparelho (roteirista ou coordenador) avisa periodicamente "estou aqui,
// vendo os dados". Assim o roteirista consegue saber se os coordenadores estão
// realmente recebendo as atualizações, e não só torcer pra estar funcionando.
var VIEWERS_KEY = 'roteiro/viewers';
var VIEWER_ONLINE_MS = 20000;
async function updateViewerHeartbeat(){
  try{
    var raw = await dbGetOnce(VIEWERS_KEY);
    var map = raw ? JSON.parse(raw) : {};
    var now = Date.now();
    Object.keys(map).forEach(function(k){ if(now - map[k].lastSeen > 5*60*1000) delete map[k]; });
    map[mySessionId] = { role: myRole, lastSeen: now };
    dbSet(VIEWERS_KEY, JSON.stringify(map));
  }catch(e){}
}
async function fetchViewerSummary(){
  try{
    var raw = await dbGetOnce(VIEWERS_KEY);
    var map = raw ? JSON.parse(raw) : {};
    var now = Date.now();
    var count = 0;
    Object.keys(map).forEach(function(k){
      if(k===mySessionId) return;
      if(map[k].role==='coordenador' && (now-map[k].lastSeen) < VIEWER_ONLINE_MS) count++;
    });
    return count;
  }catch(e){ return null; }
}
function renderViewersRow(count){
  var box = document.getElementById('viewersRow');
  if(!box) return;
  if(count === null || count === 0){
    box.innerHTML = '';
  } else {
    box.innerHTML = '<div class="status-pill" title="'+count+' coordenador'+(count>1?'es':'')+' conectado'+(count>1?'s':'')+' agora">👥 '+count+'</div>';
  }
}
function isLockedByOther(){
  return controllerInfo.sessionId && controllerInfo.sessionId !== mySessionId &&
    (Date.now() - controllerInfo.lastSeen) < CONTROLLER_TIMEOUT_MS;
}
async function claimControllerIfFree(force){
  try{
    if(!force){
      var raw = await dbGetOnce(CONTROLLER_KEY);
      var info = raw ? JSON.parse(raw) : null;
      if(info && info.sessionId !== mySessionId && (Date.now()-info.lastSeen) < CONTROLLER_TIMEOUT_MS){
        controllerInfo = info;
        return;
      }
    }
    // Parece livre (ou estamos forçando) — reivindica, mas espera um instante
    // (com uma pausa aleatória) e confere de novo. Isso evita que dois aparelhos
    // que abriram a aba Ao Vivo no mesmíssimo segundo achem, os dois, que estão
    // no controle.
    controllerInfo = { sessionId: mySessionId, lastSeen: Date.now(), name: currentUser && currentUser.name || null };
    dbSet(CONTROLLER_KEY, JSON.stringify(controllerInfo));
    if(!force){
      await new Promise(function(r){ setTimeout(r, 300 + Math.random()*400); });
      var raw2 = await dbGetOnce(CONTROLLER_KEY);
      var info2 = raw2 ? JSON.parse(raw2) : null;
      if(info2 && info2.sessionId !== mySessionId && info2.lastSeen > controllerInfo.lastSeen){
        controllerInfo = info2;
      } else {
        controllerInfo.lastSeen = Date.now();
        dbSet(CONTROLLER_KEY, JSON.stringify(controllerInfo));
      }
    }
  }catch(e){}
}

var SUPER_ADMIN_EMAILS = ['TROQUE_PARA_SEU_EMAIL@gmail.com'];

async function init(){
  if(!firebaseIsConfigured()){ renderSetupScreen(); return; }
  var ok = await initFirebase();
  if(!ok){ renderSetupScreen('Não consegui conectar ao Firebase. Confira se os valores colados estão certos, se você tem internet, e se ativou o "Anonymous" em Authentication ▸ Sign-in method no Firebase Console.'); return; }

  await loadAuthorizedEmails();

  // Se já tinha feito login com o Google antes, o Firebase lembra sozinho
  // entre recarregamentos de página — assim não precisa clicar de novo toda hora.
  var fbUser = firebase.auth().currentUser;
  if(fbUser && !fbUser.isAnonymous){
    currentUser = { uid: fbUser.uid, name: fbUser.displayName || fbUser.email, email: fbUser.email };
    mySessionId = currentUser.uid;
    isSuperAdmin = SUPER_ADMIN_EMAILS.map(function(e){return e.toLowerCase();}).indexOf((currentUser.email||'').toLowerCase()) !== -1;
  }

  await loadRole();
  if(!myRole){ renderRolePicker(); return; }
  if(myRole==='editor' && (!currentUser || !isEmailAuthorized(currentUser.email))){ myRole=null; renderRolePicker(); return; }
  startApp();
}

async function startApp(){
  document.getElementById('app').innerHTML = document.getElementById('appShellTemplate').innerHTML;
  if(myRole==='editor'){ await loadActivityLog(); }

  // Se um teste antigo ficou "ao vivo" sem ninguém reiniciar, a conta de
  // atraso/adiantamento fica toda errada, porque mistura o dia de hoje com
  // o horário real de um dia diferente. Aqui a gente detecta isso (etapa
  // "iniciada" há mais de 18 horas, o que nenhum dia real do encontro deveria
  // levar) e limpa sozinho, pra nunca mais aparecer essa tela confusa.
  function autoHealStaleProgress(eds){
    var changed = false;
    var STALE_MS = 18*60*60*1000;
    (eds||[]).forEach(function(ed){
      (ed.days||[]).forEach(function(day){
        if(day.live && day.live.activeEventId){
          var ev = day.events.find(function(e){ return e.id===day.live.activeEventId; });
          if(ev && ev.actualStartMs!=null && (Date.now()-ev.actualStartMs) > STALE_MS){
            day.events.forEach(function(e){ e.done=false; e.actualStartMs=null; e.skipped=false; });
            day.live.activeEventId = null;
            day.live.startedAt = null;
            day.live.finished = false;
            changed = true;
          }
        }
      });
    });
    return changed;
  }

  // Escuta o roteiro em tempo real: qualquer mudança feita em QUALQUER aparelho
  // chega aqui na hora, sem precisar ficar checando de tempos em tempos.
  function unwrapPayload(loaded){
    if(Array.isArray(loaded)) return { editions: loaded, activeEditionId: null }; // formato antigo (migração automática)
    return { editions: (loaded && loaded.editions) || [], activeEditionId: (loaded && loaded.activeEditionId) || null };
  }
  await new Promise(function(resolve){
    var firstLoad = true;
    dbListen(STORE_KEY, function(raw){
      syncStatus.lastOkAt = Date.now();
      syncStatus.failCount = 0;
      var loaded = null;
      try{ loaded = raw ? JSON.parse(raw) : null; }catch(e){ loaded = null; }

      if(firstLoad){
        firstLoad = false;
        var wasEmpty = !loaded;
        if(loaded){
          var unwrapped = unwrapPayload(loaded);
          editions = unwrapped.editions;
          activeEditionId = unwrapped.activeEditionId;
        }
        if(!editions.length){
          editions = seedData();
          activeEditionId = editions[0].id;
          wasEmpty = true;
        }
        lastSavedJSON = JSON.stringify({editions: editions, activeEditionId: activeEditionId});
        if(wasEmpty && myRole==='editor'){ dbSet(STORE_KEY, lastSavedJSON); }
        if(autoHealStaleProgress(editions) && myRole==='editor'){ persist(); }
        nav.editionId = activeEditionId || (editions[0] && editions[0].id);
        nav.dayId = currentEdition() && currentEdition().days[0] && currentEdition().days[0].id;
        resolve();
        return;
      }

      if(!loaded) return;
      var typing = document.activeElement && ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName);
      if(typing) return;
      var json = JSON.stringify(loaded);
      var currentJSON = JSON.stringify({editions: editions, activeEditionId: activeEditionId});
      if(json !== lastSavedJSON && json !== currentJSON){
        var unwrapped2 = unwrapPayload(loaded);
        editions = unwrapped2.editions;
        activeEditionId = unwrapped2.activeEditionId;
        lastSavedJSON = json;
        if(autoHealStaleProgress(editions) && myRole==='editor'){ persist(); }
        if(!currentEdition()){ nav.editionId = activeEditionId || (editions[0] && editions[0].id); }
        if(!currentDay() && currentEdition()){ nav.dayId = currentEdition().days[0] && currentEdition().days[0].id; }
        render();
      }
    });
  });

  await loadTheme();
  bindThemeToggle();
  bindTabBar();
  render();
  if(nav.tab==='live' && myRole==='editor') claimControllerIfFree().then(renderMain);
  activeIntervals.push(setInterval(function(){ if(nav.tab==='live') renderMain(); }, 1000));
  activeIntervals.push(setInterval(renderSyncStatusRow, 1000));
  activeIntervals.push(setInterval(function(){ if(!clockPanelOpen) renderClockSim(); }, 1000));
  renderSyncStatusRow();

  // Avisa "estou aqui" a cada 8s (todo mundo), e o roteirista confere
  // a cada 6s quantos coordenadores estão ativos.
  updateViewerHeartbeat();
  activeIntervals.push(setInterval(updateViewerHeartbeat, 8000));
  if(myRole==='editor'){
    var checkViewers = function(){ fetchViewerSummary().then(renderViewersRow); };
    checkViewers();
    activeIntervals.push(setInterval(checkViewers, 6000));
  }

  if(myRole==='editor') activeIntervals.push(setInterval(function(){ if(nav.tab==='live') claimControllerIfFree().then(renderMain); }, 5000));

  // Backup automático a cada 30 minutos, só como rede de segurança extra —
  // guarda uma cópia com carimbo de hora, mantendo só as 5 mais recentes.
  if(myRole==='editor'){
    activeIntervals.push(setInterval(function(){
      var stamp = new Date().toISOString().replace(/[:.]/g,'-');
      dbSet('roteiro/auto_backups/'+stamp, JSON.stringify({editions: editions, activeEditionId: activeEditionId, at: Date.now()}));
      dbGetOnce('roteiro/auto_backups').then(function(all){
        if(!all || typeof all !== 'object') return;
        var keys = Object.keys(all).sort();
        if(keys.length > 5){
          var kept = {};
          keys.slice(keys.length-5).forEach(function(k){ kept[k] = all[k]; });
          dbSet('roteiro/auto_backups', kept);
        }
      });
    }, 30*60*1000));
  }
}

    return;
  }
  if(!syncStatus.lastOkAt){
    box.innerHTML = '<div class="status-pill">📡 Conectando…</div>';

  }
  var secs = Math.max(0, Math.round((Date.now()-syncStatus.lastOkAt)/1000));

/* ---------- LIVE TAB ---------- */
function startEvent(day, schedule, ev){
  var orig = day.events.find(function(x){return x.id===ev.id;});
  if(orig) orig.actualStartMs = nowMs();
  day.live.activeEventId = ev.id;
  day.live.startedAt = nowMs();
  day.live.finished = false;
}
function jumpTo(day, schedule, idx){
  schedule.forEach(function(e, i){
    var orig = day.events.find(function(x){return x.id===e.id;});
    orig.done = i < idx;
    if(i > idx){ orig.actualStartMs = null; }
  });
  var target = day.events.find(function(x){return x.id===schedule[idx].id;});
  // Se essa etapa já tinha começado de verdade antes (ex: você avançou sem querer
  // e está corrigindo), mantém o horário real original — não reseta o cronômetro.
  // Só carimba "agora" se ela nunca tinha sido iniciada.
  if(target.actualStartMs == null){
    target.actualStartMs = nowMs();
  }
  day.live.activeEventId = schedule[idx].id;
  day.live.startedAt = target.actualStartMs;
  day.live.finished = false;
}

// Pula a etapa atual sem contar atraso/adiantamento pro resto do dia: em vez de
// carimbar "agora" na próxima etapa (o que geraria um desvio real), carimba o
// horário em que ela JÁ ERA esperada (considerando a recalibração do dia) —
// como se essa etapa pulada tivesse durado exatamente o previsto.
function skipEvent(day, schedule, idx, nextIdx){
  var cur = day.events.find(function(x){return x.id===schedule[idx].id;});
  cur.done = true;
  cur.skipped = true;
  // horário "neutro": como se essa etapa tivesse durado exatamente o previsto,
  // a partir de quando ela realmente começou — não herda o atraso/adiantamento
  // que já tinha rolado nela até o momento de pular.
  var neutralNextMs = cur.actualStartMs + (cur.durMin||0)*60000;
  if(nextIdx != null && schedule[nextIdx]){
    var next = day.events.find(function(x){return x.id===schedule[nextIdx].id;});
    next.actualStartMs = neutralNextMs;
    day.live.activeEventId = next.id;
    day.live.startedAt = next.actualStartMs;
    day.live.finished = false;
  } else {
    day.live.activeEventId = null;
    day.live.startedAt = null;
    day.live.finished = true;
  }
}

function renderLive(){
  return myRole==='editor' ? renderLiveEditor() : renderLiveCoordenador();
}

function renderLiveEditor(){
  var day = currentDay();
  if(!day) return '<div class="empty">Nenhum dia cadastrado ainda. Vá em Editar para criar um.</div>';
  var schedule = computeLiveSchedule(day);
  var html = '';
  var locked = isLockedByOther();

  html += renderStatusBanner(day, schedule);

  if(locked){
    var lockedByName = controllerInfo.name ? '<b>'+esc(controllerInfo.name)+'</b>' : 'Outro aparelho';
    html += '<div class="lock-banner">🔒 '+lockedByName+' está controlando o Ao Vivo agora. Você pode acompanhar, mas os botões de ação ficam escondidos aqui pra evitar os dois mexerem ao mesmo tempo.'+
      '<button class="lock-takeover" id="takeoverBtn">Assumir controle mesmo assim</button></div>';
  }

  if(day.live.finished){
    html += '<div class="finished-box"><div style="font-size:28px;">🕯️</div><div class="big">Encontro concluído</div><div style="color:var(--text-muted); font-size:13px;">Todos os momentos deste dia foram registrados.</div></div>';
  } else if(!day.live.activeEventId){
    var first = schedule[0];
    if(!first) return '<div class="empty">Este dia ainda não tem nenhum evento. Adicione em Editar.</div>';
    html += '<div class="live-hero">';
    html += '<div class="live-top-row"><span class="live-badge">Pronto para começar</span><span class="live-loc">'+esc(first.local)+'</span></div>';
    html += '<div class="live-title">'+esc(first.title)+'</div>';
    html += '<div style="color:var(--text-muted); font-size:13px;">Início previsto às <b style="color:var(--text)">'+first.time+'</b> · '+first.durMin+' min</div>';
    html += '</div>';
    if(!locked) html += '<div class="btnrow"><button class="btn btn-primary" id="startDayBtn">▶ Começar '+esc(day.label.split(',')[0])+'</button></div>';
  } else {
    var idx = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
    if(idx===-1){ day.live.activeEventId=null; return renderLiveEditor(); }
    var cur = schedule[idx];
    var elapsed = Math.floor((nowMs()-day.live.startedAt)/1000);
    var total = (cur.durMin||0)*60;
    var remaining = total - elapsed;
    var overtime = remaining < 0;
    var pct = total>0 ? Math.max(0, Math.min(1, elapsed/total)) : 1;
    var R = 41, C = 2*Math.PI*R;
    var offset = C * (1-pct);

    checkTimeAlerts(cur.id, remaining, overtime);

    var next = schedule[idx+1];
    var isLastEvent = !next;

    html += '<div class="live-hero'+(overtime && !isLastEvent?' overtime':'')+'">';
    html += '<div class="live-top-row"><span class="live-badge"><span class="dot"></span>Ao vivo agora</span><span class="live-loc">'+esc(cur.local)+'</span></div>';
    html += '<div class="live-title">'+esc(cur.title)+'</div>';
    html += '<div class="time-line">'+previstoAtualLine(cur)+'</div>';
    if(!isLastEvent){
      html += '<div class="timer-row">';
      html += '<div class="ring-wrap"><svg width="96" height="96" viewBox="0 0 96 96"><circle class="ring-bg" cx="48" cy="48" r="'+R+'"/><circle class="ring-fg'+(overtime?' overtime':'')+'" cx="48" cy="48" r="'+R+'" stroke-dasharray="'+C+'" stroke-dashoffset="'+(overtime?0:offset)+'"/></svg></div>';
      html += '<div><div class="timer-num'+(overtime?' overtime':'')+'">'+fmtClock(remaining)+'</div><div class="timer-label">'+(overtime?'tempo excedido':'restante · previsto '+cur.durMin+' min')+'</div></div>';
      html += '</div>';
    }
    html += '</div>';

    if(next){
      html += '<div class="next-strip"><div style="flex:1;"><div class="lbl">A seguir</div><div class="ttl">'+esc(next.title)+'</div><div class="meta">'+esc(next.local)+' · '+next.durMin+' min</div><div class="time-line small">'+previstoAtualLine(next)+'</div></div></div>';
      html += renderTeamAlert(next);
      if(!locked){
        if(advanceConfirmOpen){
          html += '<div class="btnrow"><button class="btn btn-danger" id="advanceConfirmBtn">Sim, avançar</button><button class="btn btn-ghost" id="advanceCancelBtn">Cancelar</button></div>';
        } else {
          html += '<div class="btnrow"><button class="btn btn-primary" id="advanceBtn">✓ Concluir e avançar</button></div>';
        }
      }
    } else {
      if(!locked){
        if(advanceConfirmOpen){
          html += '<div class="btnrow"><button class="btn btn-danger" id="finishConfirmBtn">Sim, concluir</button><button class="btn btn-ghost" id="finishCancelBtn">Cancelar</button></div>';
        } else {
          html += '<div class="btnrow"><button class="btn btn-primary" id="finishBtn">✓ Concluir encontro</button></div>';
        }
      }
    }
    if(!locked && idx>0){
      html += '<div class="btnrow" style="margin-top:0;"><button class="btn btn-ghost btn-full" id="backBtn" style="flex:1;">‹ Voltar</button></div>';
    }
  }

  html += '<div class="mini-timeline"><h3>Linha do dia</h3>';
  schedule.forEach(function(ev, i){
    var st = ev.id===day.live.activeEventId ? 'active' : (ev.done ? 'done' : '');
    var happened = ev.done || st==='active';
    var durTxt;
    if(happened){
      var diffSec = ev.durRealSec - (ev.durMin||0)*60;
      var usedCls = diffSec < 0 ? 'used-less' : (diffSec > 0 ? 'used-more' : 'used-ontime');
      durTxt = '<span class="planned-time">🕐 '+fmtMinSec((ev.durMin||0)*60)+'</span> | <span class="used-time '+usedCls+'">⏱ '+fmtMinSec(ev.durRealSec)+'</span>';
    } else {
      durTxt = ev.durMin+' min';
    }
    html += '<div class="mini-item '+st+'" data-idx="'+i+'">';
    html += timeCell(ev);
    html += '<div class="mini-check">'+(st==='done'?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#14161c" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':'')+'</div>';
    html += '<div class="mini-txt"><div class="t">'+esc(ev.title)+(ev.skipped?' <span class="skip-tag">pulada</span>':'')+'</div><div class="l">'+esc(ev.local)+' · '+durTxt+(ev.responsavel?' · '+esc(ev.responsavel):'')+'</div></div>';
    if(st!=='active'){
      html += '<button class="mini-start-btn" data-startidx="'+i+'" title="Iniciar a partir daqui">▶</button>';
    }
    html += '</div>';
  });
  html += '</div>';

  var hasProgress = day.live.activeEventId || day.live.finished || day.events.some(function(e){ return e.actualStartMs!=null || e.done; });
  if(hasProgress && !locked){
    html += renderResetControl();
  }

  return html;
}

function findLiveDayId(edition){
  if(!edition) return null;
  for(var i=0;i<edition.days.length;i++){
    if(edition.days[i].live && edition.days[i].live.activeEventId) return edition.days[i].id;
  }
  return null;
}
function renderLiveCoordenador(){
  // Segue sozinho o dia que estiver ao vivo agora, mesmo que o coordenador
  // tenha ficado olhando pra outro dia antes. Assim ele nunca precisa trocar
  // de dia manualmente pra ver o que está rolando.
  var liveDayId = findLiveDayId(currentEdition());
  if(liveDayId && liveDayId !== nav.dayId){ nav.dayId = liveDayId; }

  var day = currentDay();
  if(!day) return '<div class="empty">Nenhum dia cadastrado ainda.</div>';
  var schedule = computeLiveSchedule(day);
  var html = '';

  html += renderStatusBanner(day, schedule);

  if(day.live.finished){
    html += '<div class="finished-box"><div style="font-size:28px;">🕯️</div><div class="big">Encontro concluído</div><div style="color:var(--text-muted); font-size:13px;">Todos os momentos deste dia foram registrados.</div></div>';
  } else if(!day.live.activeEventId){
    var first = schedule[0];
    if(!first) return '<div class="empty">Este dia ainda não tem nenhum evento.</div>';
    html += '<div class="live-hero">';
    html += '<div class="live-top-row"><span class="live-badge">Ainda não começou</span><span class="live-loc">'+esc(first.local)+'</span></div>';
    html += '<div class="live-title">'+esc(first.title)+'</div>';
    html += '<div style="color:var(--text-muted); font-size:13px;">Início previsto às <b style="color:var(--text)">'+first.time+'</b> · '+first.durMin+' min</div>';
    html += '</div>';
  } else {
    var idx = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
    if(idx===-1) return '<div class="empty">Aguardando atualização…</div>';
    var cur = schedule[idx];
    var elapsed = Math.floor((nowMs()-day.live.startedAt)/1000);
    var total = (cur.durMin||0)*60;
    var remaining = total - elapsed;
    var overtime = remaining < 0;
    var pct = total>0 ? Math.max(0, Math.min(1, elapsed/total)) : 1;
    var R = 41, C = 2*Math.PI*R;
    var offset = C * (1-pct);

    checkTimeAlerts(cur.id, remaining, overtime);

    html += '<div class="live-hero'+(overtime?' overtime':'')+'">';
    html += '<div class="live-top-row"><span class="live-badge"><span class="dot"></span>Ao vivo agora</span><span class="live-loc">'+esc(cur.local)+'</span></div>';
    html += '<div class="live-title">'+esc(cur.title)+'</div>';
    html += '<div class="time-line">'+previstoAtualLine(cur)+'</div>';
    html += '<div class="timer-row">';
    html += '<div class="ring-wrap"><svg width="96" height="96" viewBox="0 0 96 96"><circle class="ring-bg" cx="48" cy="48" r="'+R+'"/><circle class="ring-fg'+(overtime?' overtime':'')+'" cx="48" cy="48" r="'+R+'" stroke-dasharray="'+C+'" stroke-dashoffset="'+(overtime?0:offset)+'"/></svg></div>';
    html += '<div><div class="timer-num'+(overtime?' overtime':'')+'">'+fmtClock(remaining)+'</div><div class="timer-label">'+(overtime?'tempo excedido':'restante · previsto '+cur.durMin+' min')+'</div></div>';
    html += '</div></div>';

    var next = schedule[idx+1];
    if(next){
      html += '<div class="next-strip"><div style="flex:1;"><div class="lbl">A seguir</div><div class="ttl">'+esc(next.title)+'</div><div class="meta">'+esc(next.local)+' · '+next.durMin+' min</div><div class="time-line small">'+previstoAtualLine(next)+'</div></div></div>';
      html += renderTeamAlert(next);
    }
  }

  // Só as próximas etapas (2-3), pra tela ficar leve. Pra ver o dia inteiro, a Programação tem tudo.
  var upcomingStart = day.live.activeEventId
    ? schedule.findIndex(function(e){return e.id===day.live.activeEventId;}) + 1
    : 0;
  var upcoming = schedule.slice(Math.max(0,upcomingStart), Math.max(0,upcomingStart)+3);

  if(upcoming.length){
    html += '<div class="mini-timeline"><h3>Próximas etapas</h3>';
    upcoming.forEach(function(ev){
      var st = ev.id===day.live.activeEventId ? 'active' : (ev.done ? 'done' : '');
      var happened = ev.done || st==='active';
      var durTxt;
      if(happened){
        var diffSec = ev.durRealSec - (ev.durMin||0)*60;
        var usedCls = diffSec < 0 ? 'used-less' : (diffSec > 0 ? 'used-more' : 'used-ontime');
        durTxt = '<span class="planned-time">🕐 '+fmtMinSec((ev.durMin||0)*60)+'</span> | <span class="used-time '+usedCls+'">⏱ '+fmtMinSec(ev.durRealSec)+'</span>';
      } else {
        durTxt = ev.durMin+' min';
      }
      html += '<div class="mini-item '+st+'">';
      html += timeCell(ev);
      html += '<div class="mini-check">'+(st==='done'?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#14161c" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':'')+'</div>';
      html += '<div class="mini-txt"><div class="t">'+esc(ev.title)+(ev.skipped?' <span class="skip-tag">pulada</span>':'')+'</div><div class="l">'+esc(ev.local)+' · '+durTxt+(ev.responsavel?' · '+esc(ev.responsavel):'')+'</div></div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="see-full-link">Veja o dia inteiro na aba <b>Programação</b> ↓</div>';
  }

  return html;
}

function bindLive(){
  var day = currentDay(); if(!day) return;
  var schedule = computeLiveSchedule(day);

  var takeoverBtn = document.getElementById('takeoverBtn');
  if(takeoverBtn) takeoverBtn.addEventListener('click', function(){
    claimControllerIfFree(true).then(render);
  });

  var startBtn = document.getElementById('startDayBtn');
  if(startBtn) startBtn.addEventListener('click', function(){
    mutate(function(){ startEvent(day, schedule, schedule[0]); });
    logActivity('Começou "'+day.label+'"');
  });
  var advBtn = document.getElementById('advanceBtn');
  if(advBtn) advBtn.addEventListener('click', function(){
    advanceConfirmOpen = true;
    render();
  });
  var advConfirmBtn = document.getElementById('advanceConfirmBtn');
  if(advConfirmBtn) advConfirmBtn.addEventListener('click', function(){
    advanceConfirmOpen = false;
    var idxNow = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
    var fromTitle = schedule[idxNow] ? schedule[idxNow].title : '';
    var toTitle = schedule[idxNow+1] ? schedule[idxNow+1].title : '';
    mutate(function(){
      var idx = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
      var orig = day.events.find(function(x){return x.id===schedule[idx].id;});
      orig.done = true;
      startEvent(day, schedule, schedule[idx+1]);
    });
    logActivity('Avançou de "'+fromTitle+'" para "'+toTitle+'"');
  });
  var advCancelBtn = document.getElementById('advanceCancelBtn');
  if(advCancelBtn) advCancelBtn.addEventListener('click', function(){
    advanceConfirmOpen = false;
    render();
  });
  var finBtn = document.getElementById('finishBtn');
  if(finBtn) finBtn.addEventListener('click', function(){
    advanceConfirmOpen = true;
    render();
  });
  var finConfirmBtn = document.getElementById('finishConfirmBtn');
  if(finConfirmBtn) finConfirmBtn.addEventListener('click', function(){
    advanceConfirmOpen = false;
    mutate(function(){
      var idx = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
      var orig = day.events.find(function(x){return x.id===schedule[idx].id;});
      orig.done = true;
      day.live.activeEventId = null;
      day.live.startedAt = null;
      day.live.finished = true;
    });
    logActivity('Concluiu o encontro de "'+day.label+'"');
  });
  var finCancelBtn = document.getElementById('finishCancelBtn');
  if(finCancelBtn) finCancelBtn.addEventListener('click', function(){
    advanceConfirmOpen = false;
    render();
  });
  var backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.addEventListener('click', function(){
    mutate(function(){
      var idx = schedule.findIndex(function(e){return e.id===day.live.activeEventId;});
      jumpTo(day, schedule, Math.max(0, idx-1));
    });
    logActivity('Voltou uma etapa em "'+day.label+'"');
  });
  var resetOpenBtn = document.getElementById('resetOpenBtn');
  if(resetOpenBtn) resetOpenBtn.addEventListener('click', function(){
    resetConfirmOpen = true;
    render();
  });
  var resetCancelBtn = document.getElementById('resetCancelBtn');
  if(resetCancelBtn) resetCancelBtn.addEventListener('click', function(){
    resetConfirmOpen = false;
    render();
  });
  var resetConfirmBtn = document.getElementById('resetConfirmBtn');
  if(resetConfirmBtn) resetConfirmBtn.addEventListener('click', function(){
    resetConfirmOpen = false;
    mutate(function(){
      day.events.forEach(function(e){ e.done=false; e.actualStartMs=null; });
      day.live.activeEventId = null;
      day.live.startedAt = null;
      day.live.finished = false;
    });
    logActivity('Reiniciou o progresso de "'+day.label+'"');
  });
  if(myRole==='editor'){
    document.querySelectorAll('.mini-start-btn').forEach(function(btn){
      btn.addEventListener('click', function(ev){
        ev.stopPropagation();
        var i = +btn.getAttribute('data-startidx');
        mutate(function(){ jumpTo(day, schedule, i); });
      });
    });
    document.querySelectorAll('.mini-item[data-idx]').forEach(function(el){
      el.addEventListener('click', function(){
        var i = +el.getAttribute('data-idx');
        mutate(function(){ jumpTo(day, schedule, i); });
      });
    });
  }
}
