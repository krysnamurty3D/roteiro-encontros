      html += '<div class="row2"><input type="text" style="flex:1;" value="'+esc(ev.local)+'" data-field="local" placeholder="Local"/>';
      html += '<div class="dur-box"><input type="number" min="0" value="'+ev.durMin+'" data-field="durMin"/><span>min</span></div></div>';
      html += '<input type="text" value="'+esc(ev.responsavel||'')+'" data-field="responsavel" placeholder="Equipe responsável (ex: Bandinha)"/>';
      html += '<input type="text" value="'+esc(ev.notes||'')+'" data-field="notes" placeholder="Anotação (opcional)"/>';
      html += '<label class="done-toggle"><input type="checkbox" data-field="done" '+(ev.done?'checked':'')+'/> já concluído</label>';
      html += '</div></div>';
    });
    html += '<p class="hint">O primeiro evento do dia (e qualquer evento marcado como 📌 fixo) define o horário de partida. Os demais horários são calculados automaticamente somando a duração de cada momento.</p>';
  }

  return html;
}

function showInlineForm(slotId, placeholder, onConfirm){
  var slot = document.getElementById(slotId);
  slot.innerHTML = '<div class="inline-form"><input type="text" id="inlineInput" placeholder="'+placeholder+'"/><button class="small-btn amber" id="inlineConfirm">OK</button><button class="small-btn" id="inlineCancel">Cancelar</button></div>';
  document.getElementById('inlineInput').focus();
  document.getElementById('inlineConfirm').addEventListener('click', function(){
    var v = document.getElementById('inlineInput').value.trim();
    if(v) onConfirm(v);
    slot.innerHTML = '';
  });
  document.getElementById('inlineCancel').addEventListener('click', function(){ slot.innerHTML=''; });
}

function showRoteiroForm(slotId, defaults, onConfirm){
  var slot = document.getElementById(slotId);
  slot.innerHTML =
    '<div class="inline-form" style="flex-direction:column; align-items:stretch;">'+
      '<input type="text" id="roteiroNameInput" placeholder="Nome do evento (ex: Encontro de Casais — 2026)" value="'+esc(defaults.name||'')+'"/>'+
      '<input type="text" id="roteiroChurchInput" placeholder="Nome da igreja (opcional)" value="'+esc(defaults.church||'')+'" style="margin-top:8px;"/>'+
      '<div style="display:flex; gap:8px; margin-top:10px;">'+
        '<button class="small-btn amber" id="roteiroFormConfirm">OK</button>'+
        '<button class="small-btn" id="roteiroFormCancel">Cancelar</button>'+
      '</div>'+
    '</div>';
  document.getElementById('roteiroNameInput').focus();
  document.getElementById('roteiroFormConfirm').addEventListener('click', function(){
    var name = document.getElementById('roteiroNameInput').value.trim();
    var church = document.getElementById('roteiroChurchInput').value.trim();
    if(name) onConfirm(name, church);
    slot.innerHTML = '';
  });
  document.getElementById('roteiroFormCancel').addEventListener('click', function(){ slot.innerHTML=''; });
}

function bindEdit(){
  var ed = currentEdition();
  var day = currentDay();

  var printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.addEventListener('click', function(){
    buildPrintable(ed);
    setTimeout(function(){ window.print(); }, 50);
  });

  var importBtn = document.getElementById('importBtn');
  var importFile = document.getElementById('importFile');
  if(importBtn && importFile){
    importBtn.addEventListener('click', function(){ importFile.click(); });
    importFile.addEventListener('change', function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        try{
          var data = new Uint8Array(evt.target.result);
          var wb = XLSX.read(data, {type:'array'});
          var days = parseWorkbookToDays(wb);
          importFile.value = '';
          if(!days.length){
            document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não consegui encontrar nenhum dia com o formato esperado (colunas HORA, TEMPO, LOCAL, EVENTO) nessa planilha.</div>';
            return;
          }
          showInlineForm('editionFormSlot', 'Nome da edição importada (ex: Encontro — 2027)', function(name){
            mutate(function(){
              var newEd = { id: uid('ed'), name: name, church: (ed && ed.church) || '', days: days };
              editions.push(newEd);
              nav.editionId = newEd.id;
              nav.dayId = days[0].id;
              activeEditionId = newEd.id;
            });
          });
        }catch(err){
          document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não consegui ler esse arquivo. Confira se é um .xlsx, .xls ou .csv válido.</div>';
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  var importWordBtn = document.getElementById('importWordBtn');
  var importWordFile = document.getElementById('importWordFile');
  if(importWordBtn && importWordFile){
    importWordBtn.addEventListener('click', function(){ importWordFile.click(); });
    importWordFile.addEventListener('change', function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        importWordFile.value = '';
        if(typeof mammoth === 'undefined'){
          document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não consegui carregar o leitor de Word. Confira sua internet e tente de novo.</div>';
          return;
        }
        mammoth.convertToHtml({arrayBuffer: evt.target.result}).then(function(result){
          var days = parseWordToDays(result.value);
          if(!days.length){
            document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não consegui encontrar nenhuma tabela com o formato esperado (colunas Horário, Duração, Local, Momento) nesse documento do Word.</div>';
            return;
          }
          showInlineForm('editionFormSlot', 'Nome da edição importada (ex: Encontro — 2027)', function(name){
            mutate(function(){
              var newEd = { id: uid('ed'), name: name, church: (ed && ed.church) || '', days: days };
              editions.push(newEd);
              nav.editionId = newEd.id;
              nav.dayId = days[0].id;
              activeEditionId = newEd.id;
            });
          });
        }).catch(function(){
          document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não consegui ler esse arquivo. Confira se é um .docx válido.</div>';
        });
      };
      reader.readAsArrayBuffer(file);
    });
  }

  var exportBackupBtn = document.getElementById('exportBackupBtn');
  if(exportBackupBtn) exportBackupBtn.addEventListener('click', function(){
    var json = JSON.stringify(editions, null, 2);
    var blob = new Blob([json], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    a.download = 'roteiro-ecc-backup-'+stamp+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  });

  var importBackupBtn = document.getElementById('importBackupBtn');
  var importBackupFile = document.getElementById('importBackupFile');
  if(importBackupBtn && importBackupFile){
    importBackupBtn.addEventListener('click', function(){ importBackupFile.click(); });
    importBackupFile.addEventListener('change', function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        importBackupFile.value = '';
        var parsed;
        try{ parsed = JSON.parse(evt.target.result); }catch(err){
          document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Esse arquivo não parece um backup válido (não consegui ler como JSON).</div>';
          return;
        }
        if(!Array.isArray(parsed) || !parsed.length){
          document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Esse arquivo não parece um backup válido do Roteiro ECC.</div>';
          return;
        }
        document.getElementById('editionFormSlot').innerHTML =
          '<div class="import-error" style="border-color:rgba(217,105,79,0.5); color:var(--text);">'+
          'Isso vai <b>substituir todos os dados atuais</b> (todas as edições e dias) pelo conteúdo desse backup. Essa ação não pode ser desfeita.'+
          '<div class="btnrow" style="margin:10px 0 0;">'+
            '<button class="btn btn-danger" id="confirmRestoreBtn">Sim, restaurar</button>'+
            '<button class="btn btn-ghost" id="cancelRestoreBtn">Cancelar</button>'+
          '</div></div>';
        document.getElementById('confirmRestoreBtn').addEventListener('click', function(){
          mutate(function(){
            editions = parsed;
            nav.editionId = editions[0] && editions[0].id;
            nav.dayId = editions[0] && editions[0].days[0] && editions[0].days[0].id;
          });
          document.getElementById('editionFormSlot').innerHTML = '';
        });
        document.getElementById('cancelRestoreBtn').addEventListener('click', function(){
          document.getElementById('editionFormSlot').innerHTML = '';
        });
      };
      reader.readAsText(file);
    });
  }

  var dup = document.getElementById('dupEditionBtn');
  if(dup) dup.addEventListener('click', function(){
    showRoteiroForm('editionFormSlot', {name: ed.name+' (cópia)', church: ed.church||''}, function(name, church){
      mutate(function(){
        var clone = JSON.parse(JSON.stringify(ed));
        clone.id = uid('ed');
        clone.name = name;
        clone.church = church;
        clone.createdBy = currentUser ? currentUser.name : 'Alguém';
        clone.createdAt = Date.now();
        clone.days.forEach(function(d){
          d.id = uid('day');
          d.live = {activeEventId:null, startedAt:null, finished:false};
          d.events.forEach(function(e){ e.id = uid('ev'); e.done=false; e.actualStartMs=null; e.skipped=false; });
        });
        editions.push(clone);
        nav.editionId = clone.id;
        nav.dayId = clone.days[0] ? clone.days[0].id : null;
        activeEditionId = clone.id;
      });
      logActivity('Duplicou o roteiro "'+ed.name+'" como "'+name+'"');
    });
  });
  var neu = document.getElementById('newEditionBtn');
  if(neu) neu.addEventListener('click', function(){
    showRoteiroForm('editionFormSlot', {name:'', church: ed && ed.church || ''}, function(name, church){
      mutate(function(){
        var day0 = {id: uid('day'), label:'Dia 1', live:{activeEventId:null,startedAt:null,finished:false}, events:[
          {id: uid('ev'), anchorTime:'08:00', durMin:30, local:'Pátio', title:'Recepção', done:false, actualStartMs:null, skipped:false, responsavel:'', notes:''}
        ]};
        var newEd = {id: uid('ed'), name:name, church:church, createdBy: currentUser ? currentUser.name : 'Alguém', createdAt: Date.now(), days:[day0]};
        editions.push(newEd);
        nav.editionId = newEd.id;
        nav.dayId = day0.id;
        activeEditionId = newEd.id;
      });
      logActivity('Criou o roteiro "'+name+'"');
    });
  });
  var ren = document.getElementById('renameEditionBtn');
  if(ren) ren.addEventListener('click', function(){
    showRoteiroForm('editionFormSlot', {name: ed.name, church: ed.church||''}, function(name, church){
      var oldName = ed.name;
      mutate(function(){
        ed.name = name;
        ed.church = church;
      });
      logActivity('Renomeou o roteiro "'+oldName+'" para "'+name+'"');
    });
  });
  var delEd = document.getElementById('deleteEditionBtn');
  if(delEd) delEd.addEventListener('click', function(){
    if(!isSuperAdmin) return;
    if(editions.length<=1){
      document.getElementById('editionFormSlot').innerHTML = '<div class="import-error">Não dá pra excluir o único roteiro que existe.</div>';
      return;
    }
    document.getElementById('editionFormSlot').innerHTML =
      '<div class="import-error" style="border-color:rgba(217,105,79,0.5); color:var(--text);">'+
      'Isso vai <b>excluir de vez</b> o roteiro "'+esc(ed.name)+'" e todos os seus dias/eventos. Não pode ser desfeito.'+
      '<div class="btnrow" style="margin:10px 0 0;">'+
        '<button class="btn btn-danger" id="confirmDeleteEdBtn">Sim, excluir</button>'+
        '<button class="btn btn-ghost" id="cancelDeleteEdBtn">Cancelar</button>'+
      '</div></div>';
    document.getElementById('confirmDeleteEdBtn').addEventListener('click', function(){
      var deletedName = ed.name;
      mutate(function(){
        var wasActive = activeEditionId === ed.id;
        editions = editions.filter(function(e){ return e.id !== ed.id; });
        nav.editionId = editions[0].id;
        nav.dayId = editions[0].days[0] && editions[0].days[0].id;
        if(wasActive){ activeEditionId = editions[0].id; }
      });
      logActivity('Excluiu o roteiro "'+deletedName+'"');
      document.getElementById('editionFormSlot').innerHTML = '';
    });
    document.getElementById('cancelDeleteEdBtn').addEventListener('click', function(){
      document.getElementById('editionFormSlot').innerHTML = '';
    });
  });

  document.querySelectorAll('[data-loadroteiro]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.getAttribute('data-loadroteiro');
      navigate(function(){
        nav.editionId = id;
        nav.dayId = currentEdition().days[0] ? currentEdition().days[0].id : null;
      });
      if(myRole==='editor'){ setActiveEdition(id); }
    });
  });

  var addAuthBtn = document.getElementById('addAuthEmailBtn');
  if(addAuthBtn) addAuthBtn.addEventListener('click', function(){
    var input = document.getElementById('newAuthEmailInput');
    var email = input.value.trim().toLowerCase();
    if(!email || email.indexOf('@')===-1) return;
    if(authorizedEmails.map(function(x){return x.toLowerCase();}).indexOf(email)===-1){
      authorizedEmails.push(email);
      saveAuthorizedEmails();
      render();
    }
  });
  document.querySelectorAll('[data-removeemail]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = +btn.getAttribute('data-removeemail');
      authorizedEmails.splice(i,1);
      saveAuthorizedEmails();
      render();
    });
  });

  var addDay = document.getElementById('addDayBtn');
  if(addDay) addDay.addEventListener('click', function(){
    mutate(function(){
      var nd = {id: uid('day'), label:'Novo dia', live:{activeEventId:null,startedAt:null,finished:false}, events:[
        {id: uid('ev'), anchorTime:'08:00', durMin:30, local:'Pátio', title:'Novo momento', done:false, actualStartMs:null, skipped:false, responsavel:'', notes:''}
      ]};
      ed.days.push(nd);
      nav.dayId = nd.id;
    });
  });

  document.querySelectorAll('.day-edit-row').forEach(function(row){
    var dId = row.getAttribute('data-day');
    var d = ed.days.find(function(x){return x.id===dId;});
    row.querySelector('input[data-field=label]').addEventListener('change', function(e){
      mutate(function(){ d.label = e.target.value; });
    });
    row.addEventListener('click', function(e){
      if(e.target.closest('[data-act=deleteDay]') || e.target.tagName==='INPUT') return;
      if(nav.dayId !== dId) navigate(function(){ nav.dayId = dId; });
    });
    var delBtn = row.querySelector('[data-act=deleteDay]');
    delBtn.addEventListener('click', function(){
      if(ed.days.length<=1) return;
      mutate(function(){
        ed.days = ed.days.filter(function(x){return x.id!==dId;});
        if(nav.dayId===dId) nav.dayId = ed.days[0].id;
      });
    });
  });

  var addEv = document.getElementById('addEventBtn');
  if(addEv) addEv.addEventListener('click', function(){
    mutate(function(){
      day.events.push({id: uid('ev'), anchorTime:null, durMin:15, local:'', title:'Novo momento', done:false, actualStartMs:null, skipped:false, responsavel:'', notes:''});
    });
  });

  if(day) document.querySelectorAll('.event-card').forEach(function(card){
    var evId = card.getAttribute('data-ev');
    var i = day.events.findIndex(function(x){return x.id===evId;});
    var ev = day.events[i];

    var timeInput = card.querySelector('input[data-field=anchorTime]');
    if(timeInput) timeInput.addEventListener('change', function(e){
      mutate(function(){ ev.anchorTime = e.target.value; });
    });
    var pinBtn = card.querySelector('[data-act=togglePin]');
    if(pinBtn) pinBtn.addEventListener('click', function(){
      mutate(function(){
        if(ev.anchorTime){ ev.anchorTime = null; }
        else { ev.anchorTime = computePlannedSchedule(day)[i].time; }
      });
    });
    card.querySelector('input[data-field=title]').addEventListener('change', function(e){
      mutate(function(){ ev.title = e.target.value; });
    });
    card.querySelector('input[data-field=local]').addEventListener('change', function(e){
      mutate(function(){ ev.local = e.target.value; });
    });
    card.querySelector('input[data-field=durMin]').addEventListener('change', function(e){
      mutate(function(){ ev.durMin = Math.max(0, parseInt(e.target.value,10)||0); });
    });
    card.querySelector('input[data-field=responsavel]').addEventListener('change', function(e){
      mutate(function(){ ev.responsavel = e.target.value; });
    });
    card.querySelector('input[data-field=notes]').addEventListener('change', function(e){
      mutate(function(){ ev.notes = e.target.value; });
    });
    card.querySelector('input[data-field=done]').addEventListener('change', function(e){
      mutate(function(){ ev.done = e.target.checked; });
    });
    var up = card.querySelector('[data-act=moveUp]');
    if(up) up.addEventListener('click', function(){
      if(i===0) return;
      mutate(function(){ var t=day.events[i-1]; day.events[i-1]=day.events[i]; day.events[i]=t; });
    });
    var down = card.querySelector('[data-act=moveDown]');
    if(down) down.addEventListener('click', function(){
      if(i===day.events.length-1) return;
      mutate(function(){ var t=day.events[i+1]; day.events[i+1]=day.events[i]; day.events[i]=t; });
    });
    var del = card.querySelector('[data-act=deleteEvent]');
    del.addEventListener('click', function(){
      mutate(function(){ day.events.splice(i,1); });
    });
  });
}

/* ---------- render orchestration ---------- */
function buildPrintable(ed){
  var box = document.getElementById('printArea');
  if(!ed || !box) return;
  var html = '<h1>'+esc(ed.name)+'</h1>';
  ed.days.forEach(function(day){
    var sched = computePlannedSchedule(day);
    html += '<h2>'+esc(day.label)+'</h2>';
    html += '<table><thead><tr><th>Horário</th><th>Duração</th><th>Local</th><th>Momento</th><th>Responsável</th></tr></thead><tbody>';
    sched.forEach(function(ev){
      html += '<tr><td>'+ev.time+'</td><td>'+ev.durMin+' min</td><td>'+esc(ev.local)+'</td><td>'+esc(ev.title)+(ev.notes?' <em>('+esc(ev.notes)+')</em>':'')+'</td><td>'+esc(ev.responsavel||'')+'</td></tr>';
    });
    html += '</tbody></table>';
  });
  box.innerHTML = html;
}

function renderMain(){
  var main = document.getElementById('mainArea');
  if(nav.tab==='live'){
    main.innerHTML = renderLive();
    bindLive();
  }
  else if(nav.tab==='program'){ main.innerHTML = renderProgram(); bindProgram(); }
  else { main.innerHTML = renderEdit(); bindEdit(); }
}

function render(){
  renderHeader();
  renderMain();
}

init();
})();
</script>
</body>
</html>
